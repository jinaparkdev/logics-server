spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:logics-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: LogicsTestHikariPool

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false

app:
  data-initializer:
    enabled: false

delivery:
  partners:
    sample:
      base-url: http://localhost:18080
      delivery-lookup-path: /api/v1/deliveries/lookup
